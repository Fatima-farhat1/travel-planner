<div class="search-page">
  <div class="search-cities-container">
    <span class="eyebrow">Step 1 of 3</span>
    <h3>{{ title }}</h3>
    <p class="hint">Try a city like "Lisbon" or "Kyoto" — we'll handle the rest.</p>

    <div class="field">
      <input
        type="text"
        [formControl]="city"
        placeholder="Enter city name"
        class="search-input"
        [class.invalid]="city.touched && city.invalid"
      />

      <div *ngIf="city.touched && city.errors?.required" class="error-message">
        City is required
      </div>
      <div *ngIf="city.touched && city.errors?.minlength" class="error-message">
        City name must be at least 3 characters long
      </div>
    </div>

    <button type="button" [disabled]="city.invalid || loading" class="search-button" (click)="onSearch()">
      {{ loading ? 'Searching…' : 'Search' }}
    </button>

    <div *ngIf="errorMessage" class="error-message" style="margin-top: 18px;">
      {{ errorMessage }}
    </div>
  </div>

  <p *ngIf="!loading && !errorMessage && hasSearched && !results.length" class="no-results">
    No cities matched that search. Try a different name.
  </p>

  <div class="results" *ngIf="results.length">
    <div class="ticket-card result-card" *ngFor="let result of results">
      <a [routerLink]="['/city', result.id]" class="result-image-link">
        <div class="result-image" [style.backgroundImage]="'url(' + result.image + ')'"></div>
      </a>
      <div class="result-body">
        <a [routerLink]="['/city', result.id]" class="result-title-link">
          <h4>{{ result.name }}</h4>
        </a>
        <p>{{ result.description }}</p>
        <div class="result-actions">
          <a [routerLink]="['/city', result.id]" class="details-link">View details →</a>
          <button class="save-button" (click)="saveFavorite(result)" [disabled]="isSaved(result)">
            {{ isSaved(result) ? 'Saved ✓' : 'Save to favorites' }}
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
